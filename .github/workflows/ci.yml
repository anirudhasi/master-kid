# CI quality gate (dev spec Stage 0, PR-2): lint + typecheck + build on every PR.
# Deployment stays in the Azure SWA workflow; this one only proves the tree is green.
name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
